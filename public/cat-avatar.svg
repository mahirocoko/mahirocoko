<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" role="img" aria-labelledby="title desc">
  <title id="title">Mahiro space cat avatar</title>
  <desc id="desc">Stylized space cat inside an astronaut helmet on a cosmic background.</desc>
  <defs>
    <linearGradient id="space-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0B0B2A"/>
      <stop offset="50%" stop-color="#1B1464"/>
      <stop offset="100%" stop-color="#4A0E4E"/>
    </linearGradient>
    <radialGradient id="helmet-glass" cx="40%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.3"/>
      <stop offset="50%" stop-color="#88CCFF" stop-opacity="0.1"/>
      <stop offset="90%" stop-color="#4488FF" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.4"/>
    </radialGradient>
    <linearGradient id="suit" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#CBD5E1"/>
    </linearGradient>
    <linearGradient id="cat-fur" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#E2E8F0"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="240" height="240" rx="120" fill="url(#space-bg)"/>

  <!-- Stars -->
  <g fill="#FFF" opacity="0.8">
    <circle cx="50" cy="70" r="1.5" filter="url(#glow)"/>
    <circle cx="180" cy="40" r="2" filter="url(#glow)"/>
    <circle cx="200" cy="150" r="1"/>
    <circle cx="40" cy="160" r="2" filter="url(#glow)"/>
    <circle cx="90" cy="30" r="1"/>
    <path d="M140 30 L142 34 L146 36 L142 38 L140 42 L138 38 L134 36 L138 34 Z" fill="#FDE047" filter="url(#glow)"/>
    <path d="M60 120 L61 123 L64 124 L61 125 L60 128 L59 125 L56 124 L59 123 Z" fill="#67E8F9" filter="url(#glow)"/>
  </g>

  <!-- Spacesuit Body -->
  <path d="M50 240 C50 180 80 160 120 160 C160 160 190 180 190 240 Z" fill="url(#suit)"/>
  
  <!-- Suit Details -->
  <path d="M90 190 L150 190" stroke="#94A3B8" stroke-width="4" stroke-linecap="round"/>
  <path d="M95 210 L145 210" stroke="#94A3B8" stroke-width="4" stroke-linecap="round"/>
  <circle cx="120" cy="200" r="8" fill="#38BDF8"/>
  <circle cx="120" cy="200" r="4" fill="#BAE6FD"/>

  <!-- Cat Base -->
  <g transform="translate(120, 115)">
    <!-- Ears -->
    <path d="M-22 -15 L-35 -40 L-5 -30 Z" fill="url(#cat-fur)"/>
    <path d="M22 -15 L35 -40 L5 -30 Z" fill="url(#cat-fur)"/>
    <path d="M-21 -18 L-29 -34 L-10 -26 Z" fill="#F472B6"/>
    <path d="M21 -18 L29 -34 L10 -26 Z" fill="#F472B6"/>
    
    <!-- Head -->
    <ellipse cx="0" cy="0" rx="36" ry="28" fill="url(#cat-fur)"/>
    
    <!-- Eyes (Cosmic) -->
    <circle cx="-14" cy="-2" r="8" fill="#0B0B2A"/>
    <circle cx="14" cy="-2" r="8" fill="#0B0B2A"/>
    
    <!-- Eye Highlights -->
    <circle cx="-16" cy="-4" r="3" fill="#FFFFFF"/>
    <circle cx="-11" cy="1" r="1.5" fill="#38BDF8"/>
    <circle cx="12" cy="-4" r="3" fill="#FFFFFF"/>
    <circle cx="17" cy="1" r="1.5" fill="#38BDF8"/>

    <!-- Nose -->
    <path d="M-3 7 L3 7 L0 10 Z" fill="#FB7185"/>
    
    <!-- Mouth -->
    <path d="M-6 12 Q-3 15 0 12 Q3 15 6 12" fill="none" stroke="#334155" stroke-width="1.5" stroke-linecap="round"/>
    
    <!-- Whiskers -->
    <path d="M-22 2 L-36 -2" stroke="#94A3B8" stroke-width="1.5" stroke-linecap="round"/>
    <path d="M-22 7 L-38 7" stroke="#94A3B8" stroke-width="1.5" stroke-linecap="round"/>
    <path d="M-22 12 L-36 16" stroke="#94A3B8" stroke-width="1.5" stroke-linecap="round"/>
    
    <path d="M22 2 L36 -2" stroke="#94A3B8" stroke-width="1.5" stroke-linecap="round"/>
    <path d="M22 7 L38 7" stroke="#94A3B8" stroke-width="1.5" stroke-linecap="round"/>
    <path d="M22 12 L36 16" stroke="#94A3B8" stroke-width="1.5" stroke-linecap="round"/>
  </g>

  <!-- Helmet Glass -->
  <circle cx="120" cy="110" r="60" fill="url(#helmet-glass)"/>
  <circle cx="120" cy="110" r="60" fill="none" stroke="#FFFFFF" stroke-opacity="0.2" stroke-width="2"/>
  
  <!-- Helmet Reflections -->
  <path d="M75 80 A 50 50 0 0 1 145 60 A 55 55 0 0 0 70 95 Z" fill="#FFFFFF" opacity="0.6"/>
  <path d="M170 125 A 55 55 0 0 1 145 160 A 60 60 0 0 0 175 110 Z" fill="#38BDF8" opacity="0.3"/>

  <!-- Helmet Base Ring -->
  <ellipse cx="120" cy="168" rx="64" ry="12" fill="#F8FAFC"/>
  <ellipse cx="120" cy="168" rx="64" ry="12" fill="none" stroke="#CBD5E1" stroke-width="2"/>
  <ellipse cx="120" cy="165" rx="60" ry="9" fill="#94A3B8"/>
  
  <!-- Base Ring Details -->
  <rect x="80" y="162" width="12" height="6" rx="2" fill="#475569"/>
  <rect x="148" y="162" width="12" height="6" rx="2" fill="#475569"/>
  <rect x="114" y="164" width="12" height="4" rx="2" fill="#F43F5E"/>

</svg>
