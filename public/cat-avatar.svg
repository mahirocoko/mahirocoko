<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="#1a1a2e"/>
  
  <!-- Cat ears -->
  <polygon points="45,70 70,30 85,70" fill="#f5f5f5"/>
  <polygon points="50,65 70,40 80,65" fill="#ffb6c1"/>
  <polygon points="155,70 130,30 115,70" fill="#f5f5f5"/>
  <polygon points="150,65 130,40 120,65" fill="#ffb6c1"/>
  
  <!-- Cat face -->
  <ellipse cx="100" cy="110" rx="55" ry="50" fill="#f5f5f5"/>
  
  <!-- Eyes -->
  <ellipse cx="75" cy="100" rx="12" ry="14" fill="#1a1a2e"/>
  <ellipse cx="125" cy="100" rx="12" ry="14" fill="#1a1a2e"/>
  <circle cx="78" cy="95" r="4" fill="#fff"/>
  <circle cx="128" cy="95" r="4" fill="#fff"/>
  
  <!-- Nose -->
  <polygon points="100,115 93,125 107,125" fill="#ffb6c1"/>
  
  <!-- Mouth -->
  <path d="M 85 130 Q 100 140 115 130" stroke="#666" stroke-width="2" fill="none"/>
  <line x1="100" y1="125" x2="100" y2="132" stroke="#666" stroke-width="2"/>
  
  <!-- Whiskers -->
  <line x1="50" y1="115" x2="20" y2="110" stroke="#ddd" stroke-width="1.5"/>
  <line x1="50" y1="120" x2="20" y2="125" stroke="#ddd" stroke-width="1.5"/>
  <line x1="50" y1="125" x2="20" y2="140" stroke="#ddd" stroke-width="1.5"/>
  <line x1="150" y1="115" x2="180" y2="110" stroke="#ddd" stroke-width="1.5"/>
  <line x1="150" y1="120" x2="180" y2="125" stroke="#ddd" stroke-width="1.5"/>
  <line x1="150" y1="125" x2="180" y2="140" stroke="#ddd" stroke-width="1.5"/>
  
  <!-- Coding glasses -->
  <rect x="55" y="88" rx="5" ry="5" width="30" height="22" fill="none" stroke="#4a90d9" stroke-width="2"/>
  <rect x="115" y="88" rx="5" ry="5" width="30" height="22" fill="none" stroke="#4a90d9" stroke-width="2"/>
  <line x1="85" y1="99" x2="115" y2="99" stroke="#4a90d9" stroke-width="2"/>
  
  <!-- Small sparkle -->
  <text x="165" y="55" font-size="20" fill="#ffd700">✨</text>
</svg>