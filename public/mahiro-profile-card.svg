<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 420" role="img" aria-labelledby="title desc">
  <title id="title">Mahiro profile card</title>
  <desc id="desc">Beautiful profile card with space cat avatar, glowing moon, and cosmic accents.</desc>
  <defs>
    <!-- Background Gradients -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0B0F19"/>
      <stop offset="40%" stop-color="#1A1C3B"/>
      <stop offset="80%" stop-color="#4B1D3F"/>
      <stop offset="100%" stop-color="#7B1A3D"/>
    </linearGradient>
    
    <linearGradient id="panel" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.03"/>
    </linearGradient>

    <linearGradient id="panel-stroke" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.05"/>
    </linearGradient>
    
    <linearGradient id="chip" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E293B" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#0F172A" stop-opacity="0.8"/>
    </linearGradient>

    <radialGradient id="moon" cx="85%" cy="20%" r="40%">
      <stop offset="0%" stop-color="#FDE047"/>
      <stop offset="50%" stop-color="#EAB308" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#B45309" stop-opacity="0"/>
    </radialGradient>

    <!-- Avatar Gradients -->
    <radialGradient id="helmet-glass" cx="40%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.3"/>
      <stop offset="50%" stop-color="#88CCFF" stop-opacity="0.1"/>
      <stop offset="90%" stop-color="#4488FF" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.4"/>
    </radialGradient>
    <linearGradient id="suit" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#CBD5E1"/>
    </linearGradient>
    <linearGradient id="cat-fur" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#E2E8F0"/>
    </linearGradient>

    <!-- Filters -->
    <filter id="shadow-lg" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="24" flood-color="#000000" flood-opacity="0.4"/>
    </filter>
    <filter id="shadow-sm" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <rect width="960" height="420" rx="32" fill="url(#bg)"/>
  
  <circle cx="820" cy="120" r="140" fill="url(#moon)"/>
  <circle cx="820" cy="120" r="60" fill="#FEF3C7" fill-opacity="0.9" filter="url(#glow)"/>

  <g fill="#FFF" opacity="0.4">
    <circle cx="100" cy="80" r="2"/>
    <circle cx="300" cy="50" r="1.5"/>
    <circle cx="500" cy="100" r="2.5"/>
    <circle cx="700" cy="60" r="1"/>
    <circle cx="900" cy="250" r="2"/>
    <circle cx="150" cy="300" r="1.5"/>
  </g>

  <path d="M0 320 C100 280 200 280 300 310 C400 340 500 340 600 310 C700 280 800 280 960 330 V420 H0 Z" fill="#020617" fill-opacity="0.6"/>
  <path d="M0 290 C120 250 240 250 360 290 C480 330 600 330 720 290 C840 250 900 260 960 280 V420 H0 Z" fill="#0F172A" fill-opacity="0.4"/>
  <path d="M0 290 C120 250 240 250 360 290 C480 330 600 330 720 290 C840 250 900 260 960 280" fill="none" stroke="#FBBF24" stroke-opacity="0.4" stroke-width="2"/>

  <g fill="#F472B6" opacity="0.85" filter="url(#glow)">
    <path d="M850 180 Q855 175 860 182 Q855 185 850 180 Z" transform="rotate(25 855 180) scale(1.5)"/>
    <path d="M830 220 Q835 215 840 222 Q835 225 830 220 Z" transform="rotate(-15 835 220) scale(1.2)"/>
    <path d="M100 150 Q105 145 110 152 Q105 155 100 150 Z" transform="rotate(45 105 150) scale(1.8)"/>
    <path d="M130 180 Q135 175 140 182 Q135 185 130 180 Z" transform="rotate(-30 135 180) scale(1.3)"/>
    <path d="M60 220 Q65 215 70 222 Q65 225 60 220 Z" transform="rotate(10 65 220) scale(1.5)"/>
  </g>

  <rect x="40" y="40" width="880" height="340" rx="24" fill="url(#panel)" stroke="url(#panel-stroke)" stroke-width="1.5" filter="url(#shadow-lg)"/>

  <g transform="translate(80, 0)">
    
    <g transform="translate(0, 90) scale(0.9)">
      <circle cx="120" cy="120" r="100" fill="#020617" fill-opacity="0.5"/>
      <circle cx="120" cy="120" r="98" fill="none" stroke="#38BDF8" stroke-width="2" stroke-opacity="0.3"/>
      
      <g filter="url(#shadow-sm)">
        <!-- Spacesuit Body -->
        <path d="M50 240 C50 180 80 160 120 160 C160 160 190 180 190 240 Z" fill="url(#suit)"/>
        
        <!-- Suit Details -->
        <path d="M90 190 L150 190" stroke="#94A3B8" stroke-width="4" stroke-linecap="round"/>
        <path d="M95 210 L145 210" stroke="#94A3B8" stroke-width="4" stroke-linecap="round"/>
        <circle cx="120" cy="200" r="8" fill="#38BDF8"/>
        <circle cx="120" cy="200" r="4" fill="#BAE6FD"/>

        <!-- Cat Base -->
        <g transform="translate(120, 115)">
          <!-- Ears -->
          <path d="M-22 -15 L-35 -40 L-5 -30 Z" fill="url(#cat-fur)"/>
          <path d="M22 -15 L35 -40 L5 -30 Z" fill="url(#cat-fur)"/>
          <path d="M-21 -18 L-29 -34 L-10 -26 Z" fill="#F472B6"/>
          <path d="M21 -18 L29 -34 L10 -26 Z" fill="#F472B6"/>
          
          <!-- Head -->
          <ellipse cx="0" cy="0" rx="36" ry="28" fill="url(#cat-fur)"/>
          
          <!-- Eyes (Cosmic) -->
          <circle cx="-14" cy="-2" r="8" fill="#0B0B2A"/>
          <circle cx="14" cy="-2" r="8" fill="#0B0B2A"/>
          
          <!-- Eye Highlights -->
          <circle cx="-16" cy="-4" r="3" fill="#FFFFFF"/>
          <circle cx="-11" cy="1" r="1.5" fill="#38BDF8"/>
          <circle cx="12" cy="-4" r="3" fill="#FFFFFF"/>
          <circle cx="17" cy="1" r="1.5" fill="#38BDF8"/>

          <!-- Nose -->
          <path d="M-3 7 L3 7 L0 10 Z" fill="#FB7185"/>
          
          <!-- Mouth -->
          <path d="M-6 12 Q-3 15 0 12 Q3 15 6 12" fill="none" stroke="#334155" stroke-width="1.5" stroke-linecap="round"/>
          
          <!-- Whiskers -->
          <path d="M-22 2 L-36 -2" stroke="#94A3B8" stroke-width="1.5" stroke-linecap="round"/>
          <path d="M-22 7 L-38 7" stroke="#94A3B8" stroke-width="1.5" stroke-linecap="round"/>
          <path d="M-22 12 L-36 16" stroke="#94A3B8" stroke-width="1.5" stroke-linecap="round"/>
          
          <path d="M22 2 L36 -2" stroke="#94A3B8" stroke-width="1.5" stroke-linecap="round"/>
          <path d="M22 7 L38 7" stroke="#94A3B8" stroke-width="1.5" stroke-linecap="round"/>
          <path d="M22 12 L36 16" stroke="#94A3B8" stroke-width="1.5" stroke-linecap="round"/>
        </g>

        <!-- Helmet Glass -->
        <circle cx="120" cy="110" r="60" fill="url(#helmet-glass)"/>
        <circle cx="120" cy="110" r="60" fill="none" stroke="#FFFFFF" stroke-opacity="0.2" stroke-width="2"/>
        
        <!-- Helmet Reflections -->
        <path d="M75 80 A 50 50 0 0 1 145 60 A 55 55 0 0 0 70 95 Z" fill="#FFFFFF" opacity="0.6"/>
        <path d="M170 125 A 55 55 0 0 1 145 160 A 60 60 0 0 0 175 110 Z" fill="#38BDF8" opacity="0.3"/>

        <!-- Helmet Base Ring -->
        <ellipse cx="120" cy="168" rx="64" ry="12" fill="#F8FAFC"/>
        <ellipse cx="120" cy="168" rx="64" ry="12" fill="none" stroke="#CBD5E1" stroke-width="2"/>
        <ellipse cx="120" cy="165" rx="60" ry="9" fill="#94A3B8"/>
        
        <!-- Base Ring Details -->
        <rect x="80" y="162" width="12" height="6" rx="2" fill="#475569"/>
        <rect x="148" y="162" width="12" height="6" rx="2" fill="#475569"/>
        <rect x="114" y="164" width="12" height="4" rx="2" fill="#F43F5E"/>
      </g>
    </g>

    <text x="260" y="115" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="600" fill="#FDE047" letter-spacing="6">MAHIRO COKAWA</text>
    
    <text x="258" y="170" font-family="system-ui, -apple-system, sans-serif" font-size="48" font-weight="800" fill="#FFFFFF" filter="url(#glow)">Frontend Developer</text>
    
    <text x="260" y="215" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="400" fill="#E2E8F0" opacity="0.9">Building playful interfaces, crafting experiences,</text>
    <text x="260" y="245" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="400" fill="#E2E8F0" opacity="0.9">and soft chaos with Japanese night-market energy.</text>

    <g font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="600" fill="#F8FAFC">
      <g transform="translate(260, 280)">
        <rect width="100" height="36" rx="18" fill="url(#chip)" stroke="#38BDF8" stroke-width="1.5" stroke-opacity="0.5"/>
        <text x="50" y="23" text-anchor="middle">React</text>
      </g>
      <g transform="translate(375, 280)">
        <rect width="130" height="36" rx="18" fill="url(#chip)" stroke="#60A5FA" stroke-width="1.5" stroke-opacity="0.5"/>
        <text x="65" y="23" text-anchor="middle">TypeScript</text>
      </g>
      <g transform="translate(520, 280)">
        <rect width="100" height="36" rx="18" fill="url(#chip)" stroke="#F472B6" stroke-width="1.5" stroke-opacity="0.5"/>
        <text x="50" y="23" text-anchor="middle">Design</text>
      </g>
    </g>

    <g font-family="system-ui, -apple-system, sans-serif" transform="translate(260, 350)">
      <rect width="12" height="12" rx="6" fill="#10B981" filter="url(#glow)"/>
      <text x="24" y="11" font-size="16" font-weight="600" fill="#94A3B8" letter-spacing="1">CURRENT MODE</text>
      <text x="160" y="11" font-size="16" font-weight="500" fill="#F1F5F9">Working at Mars space.</text>
    </g>
  </g>
</svg>
